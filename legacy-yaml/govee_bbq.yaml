      # ----------------------------- Probe 3 -----------------------------
      - name: "BBQ Probe 3 Above High"
        unique_id: bbq_probe_3_above_high
        icon: mdi:fire-alert
        availability: "{{ has_value('sensor.kitchen_meat_thermometer_temperature_probe_3') }}"
        state: >-
