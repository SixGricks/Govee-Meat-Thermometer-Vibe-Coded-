      - name: "BBQ Probe 4 Below Low"
        unique_id: bbq_probe_4_below_low
        icon: mdi:snowflake-alert
        availability: "{{ has_value('sensor.kitchen_meat_thermometer_temperature_probe_4') }}"
        state: >-
