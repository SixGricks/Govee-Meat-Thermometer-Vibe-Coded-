# ============================================================================
# GOVEE H5055 BBQ THERMOMETER — HOME ASSISTANT PACKAGE
# ============================================================================
#
# WHAT THIS FILE IS
# -----------------
# A self-contained Home Assistant "package" that adds smart alerting on top of
# the Govee H5055 6-probe BBQ thermometer. The thermometer itself is read-only:
# its data arrives passively over Bluetooth advertisements (via an ESPHome
# Bluetooth proxy + the official Govee BLE integration), so all targets,
# alarms, and notifications live here in Home Assistant — not on the device.
#
# This package creates, for each of the 6 probes:
#   * a friendly name helper           (input_text.bbq_probe_N_name)
#   * a high-target helper             (input_number.bbq_probe_N_high)
#   * a low-target helper              (input_number.bbq_probe_N_low)
#   * an "alerts armed" switch         (input_boolean.bbq_probe_N_alerts)
#   * three template binary sensors    (above_high / below_low / approaching_high)
# ...plus a global "approaching target" offset, a preset list + script, three
# automations (alarm, repeating reminder, pause-from-notification), and a
# notify group that fans alerts out to your phone(s).
#
# HOW TO INSTALL
# --------------
# 1. Make sure your configuration.yaml contains:
#        homeassistant:
#          packages: !include_dir_named packages
# 2. Drop this file into the "packages" folder next to configuration.yaml.
# 3. Complete the REQUIRED EDITS below, then restart Home Assistant.
#
# ============================================================================
# REQUIRED EDITS — do these before restarting HA!
# ============================================================================
# [ ] 1. Replace ALL SIX probe entity placeholders with your real entity ids:
#          sensor.kitchen_meat_thermometer_temperature_probe_1
#          sensor.kitchen_meat_thermometer_temperature_probe_2
#          sensor.kitchen_meat_thermometer_temperature_probe_3
#          sensor.kitchen_meat_thermometer_temperature_probe_4
#          sensor.kitchen_meat_thermometer_temperature_probe_5
#          sensor.kitchen_meat_thermometer_temperature_probe_6
#        Find your real ids in Developer Tools > States by searching for
#        "h5055" or "probe". Each placeholder appears more than once, so use
#        your editor's find-and-replace (one pass per probe).
#
# [ ] 2. Replace mobile_app_YOUR_PHONE_HERE (in the notify: block at the very
#        bottom) with your Companion app notify service. Find it in
#        Developer Tools > Actions by typing "notify.mobile_app" — use the
#        part after "notify." (e.g. notify.mobile_app_pixel_8 ->
#        mobile_app_pixel_8).
# ============================================================================


# ============================================================================
# HELPERS — probe names
# ============================================================================
# One text helper per probe so you can label what's on each probe (e.g.
# "Brisket flat"). These names show up in the dashboard card and in every
# notification.
#
# NOTE: we deliberately do NOT set 'initial:' here. If we did, Home Assistant
# would reset every name back to that value on each restart — and nobody wants
# their brisket renamed mid-cook.
input_text:
  bbq_probe_1_name:
    name: BBQ Probe 1 Name
    max: 30
    icon: mdi:tag
  bbq_probe_2_name:
    name: BBQ Probe 2 Name
    max: 30
    icon: mdi:tag
  bbq_probe_3_name:
    name: BBQ Probe 3 Name
    max: 30
    icon: mdi:tag
  bbq_probe_4_name:
    name: BBQ Probe 4 Name
    max: 30
    icon: mdi:tag
  bbq_probe_5_name:
    name: BBQ Probe 5 Name
    max: 30
    icon: mdi:tag
  bbq_probe_6_name:
    name: BBQ Probe 6 Name
    max: 30
    icon: mdi:tag


# ============================================================================
# HELPERS — high/low targets + global "approaching" offset
# ============================================================================
# Targets are unit-agnostic: whatever unit your probe sensors report (°F or
# °C) is the unit these numbers are compared against. The "°" unit label here
# is just cosmetic.
#
# A value of 0 means "this alarm is disabled" — the template sensors below
# only fire when the target is greater than 0.
input_number:
  # ----- Probe 1 -----
  bbq_probe_1_high:
    name: BBQ Probe 1 High Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-up
  bbq_probe_1_low:
    name: BBQ Probe 1 Low Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-down

  # ----- Probe 2 -----
  bbq_probe_2_high:
    name: BBQ Probe 2 High Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-up
  bbq_probe_2_low:
    name: BBQ Probe 2 Low Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-down

  # ----- Probe 3 -----
  bbq_probe_3_high:
    name: BBQ Probe 3 High Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-up
  bbq_probe_3_low:
    name: BBQ Probe 3 Low Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-down

  # ----- Probe 4 -----
  bbq_probe_4_high:
    name: BBQ Probe 4 High Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-up
  bbq_probe_4_low:
    name: BBQ Probe 4 Low Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-down

  # ----- Probe 5 -----
  bbq_probe_5_high:
    name: BBQ Probe 5 High Target
    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-up
  bbq_probe_5_low:
    name: BBQ Probe 5 Low Target
    min: 0
    max: 600
