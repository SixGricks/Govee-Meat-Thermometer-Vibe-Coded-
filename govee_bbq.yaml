    min: 0
    max: 600
    step: 1
    mode: box
    unit_of_measurement: "°"
    icon: mdi:thermometer-chevron-down

  # ----- Global "approaching target" offset -----
  # When a probe gets within this many degrees of its high target, you get a
  # one-shot heads-up notification ("almost there!"). Set to 0 to disable
  # approach warnings entirely.
  #
  # NOTE: like the name helpers above, no 'initial:' here — it would reset
  # your chosen offset on every restart. A fresh install starts at 0
  # (approach warnings off); set it to 10 once after installing (see README).
  bbq_approach_offset:
    name: BBQ Approaching-Target Offset
    min: 0
