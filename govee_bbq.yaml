          {{ high > 0 and offset > 0 and (high - offset) <= temp and temp < high }}
        delay_on: "00:00:10"

      # ----------------------------- Probe 3 -----------------------------
      - name: "BBQ Probe 3 Above High"
        unique_id: bbq_probe_3_above_high
