# ============================================================================
# AUTOMATIONS
# ============================================================================
automation:
  # --------------------------------------------------------------------------
  # AUTOMATION 1 — "BBQ: probe alarm"
  # --------------------------------------------------------------------------
  # Fires the moment any threshold binary sensor flips on. The trigger id
  # encodes which probe and which kind of alarm ("1_high", "4_approach", ...)
  # so one automation handles all 18 sensors.
  #
  # mode: parallel lets multiple probes alarm at the same time without one
  # notification blocking another (very possible with 6 probes going).
  #
  # Every trigger uses from: "off" so only a GENUINE off -> on threshold
  # crossing alarms. Without it, a brief Bluetooth dropout (sensor flips to
  # 'unavailable' and back while the meat is still over target) would re-fire
  # the loud alarm. Any crossing masked by a dropout is still caught within
  # 5 minutes by the reminder automation below.
  - id: bbq_probe_alarm
    alias: "BBQ: probe alarm"
    description: >-
      Sends a push notification when a probe crosses its high target, drops
      below its low target, or approaches its high target. Only fires if that
      probe's alerts are armed.
    mode: parallel
    max: 18
    trigger:
      # ----- Above-high triggers -----
      - trigger: state
        entity_id: binary_sensor.bbq_probe_1_above_high
        from: "off"
        to: "on"
        id: "1_high"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_2_above_high
        from: "off"
        to: "on"
        id: "2_high"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_3_above_high
        from: "off"
        to: "on"
        id: "3_high"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_4_above_high
        from: "off"
        to: "on"
        id: "4_high"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_5_above_high
        from: "off"
        to: "on"
        id: "5_high"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_6_above_high
        from: "off"
        to: "on"
        id: "6_high"
      # ----- Below-low triggers -----
      - trigger: state
        entity_id: binary_sensor.bbq_probe_1_below_low
        from: "off"
        to: "on"
        id: "1_low"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_2_below_low
        from: "off"
        to: "on"
        id: "2_low"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_3_below_low
        from: "off"
        to: "on"
        id: "3_low"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_4_below_low
        from: "off"
        to: "on"
        id: "4_low"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_5_below_low
        from: "off"
        to: "on"
        id: "5_low"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_6_below_low
        from: "off"
        to: "on"
        id: "6_low"
      # ----- Approaching-high triggers -----
      - trigger: state
        entity_id: binary_sensor.bbq_probe_1_approaching_high
        from: "off"
        to: "on"
        id: "1_approach"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_2_approaching_high
        from: "off"
        to: "on"
        id: "2_approach"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_3_approaching_high
        from: "off"
        to: "on"
        id: "3_approach"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_4_approaching_high
        from: "off"
        to: "on"
        id: "4_approach"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_5_approaching_high
        from: "off"
        to: "on"
        id: "5_approach"
      - trigger: state
        entity_id: binary_sensor.bbq_probe_6_approaching_high
        from: "off"
        to: "on"
        id: "6_approach"
    condition:
      # Arming check: parse the probe number out of the trigger id
      # ("3_high" -> "3") and require that probe's alerts to be on.
      - condition: template
        value_template: >-
          {{ is_state('input_boolean.bbq_probe_' ~ trigger.id.split('_')[0] ~ '_alerts', 'on') }}
    action:
      - variables:
          # "3_approach" -> probe = 3, kind = "approach"
          probe: "{{ trigger.id.split('_')[0] | int }}"
          kind: "{{ trigger.id.split('_')[1] }}"
          # Friendly name, falling back to "Probe N" if the helper is empty
          # or has never been set (state 'unknown').
          probe_name: >-
            {% set n = states('input_text.bbq_probe_' ~ probe ~ '_name') | trim %}
            {{ n if n not in ['', 'unknown', 'unavailable'] else 'Probe ' ~ probe }}
          # Current temperature comes from the binary sensor's source probe.
          # trigger.entity_id is the binary sensor; we read the matching
          # placeholder sensor by probe number instead.
          probe_sensors:
            1: sensor.kitchen_meat_thermometer_temperature_probe_1
            2: sensor.kitchen_meat_thermometer_temperature_probe_2
            3: sensor.kitchen_meat_thermometer_temperature_probe_3
            4: sensor.kitchen_meat_thermometer_temperature_probe_4
            5: sensor.kitchen_meat_thermometer_temperature_probe_5
            6: sensor.kitchen_meat_thermometer_temperature_probe_6
          temp: "{{ states(probe_sensors[probe]) | float(0) | round(1) }}"
          high_target: "{{ states('input_number.bbq_probe_' ~ probe ~ '_high') | float(0) | round(0) }}"
          low_target: "{{ states('input_number.bbq_probe_' ~ probe ~ '_low') | float(0) | round(0) }}"
          notify_title: >-
            {% if kind == 'high' %}
              🔥 {{ probe_name }} hit {{ temp }}°
            {% elif kind == 'low' %}
              🥶 {{ probe_name }} dropped to {{ temp }}°
            {% else %}
              ⏰ {{ probe_name }} approaching target
            {% endif %}
          notify_message: >-
            {% if kind == 'high' %}
              Now {{ temp }}° — high target is {{ high_target }}°.
            {% elif kind == 'low' %}
              Now {{ temp }}° — low target is {{ low_target }}°.
            {% else %}
              Now {{ temp }}° — high target is {{ high_target }}° ({{ (high_target - temp) | round(1) }}° to go).
            {% endif %}
      - action: notify.bbq_alert_targets
        data:
          title: "{{ notify_title | trim }}"
          message: "{{ notify_message | trim }}"
          data:
            # tag makes repeat notifications for the same probe REPLACE the
            # previous one instead of stacking up in the notification shade.
            tag: "bbq-probe-{{ probe }}"
            # ----- Android keys -----
            channel: "BBQ Alarm"           # own channel -> own sound/vibration settings
            importance: high
            priority: high
            ttl: 0                          # deliver immediately, don't batch
            sticky: "true"                  # tapping doesn't dismiss it
            actions:
              - action: "BBQ_PAUSE_{{ probe }}"
                title: "Pause alerts"
            # ----- iOS keys (harmless on Android) -----
            push:
              sound:
                name: default
                critical: 1
                volume: 1.0
              interruption-level: time-sensitive

  # --------------------------------------------------------------------------
  # AUTOMATION 2 — "BBQ: alarm reminder"
  # --------------------------------------------------------------------------
  # If a probe is STILL above its high target (or below its low target) and
  # still armed, re-send the notification every 5 minutes so you can't miss
  # it. Because each notification uses the same tag, the reminder REPLACES
  # the previous notification rather than piling up.
  #
  # "Approaching" alerts deliberately do NOT repeat — they are a one-shot
  # heads-up only.
  #
  # TO CHANGE THE CADENCE: edit the minutes pattern below.
  #   "/5"  = every 5 minutes,  "/2" = every 2 minutes, "/10" = every 10.
  - id: bbq_alarm_reminder
    alias: "BBQ: alarm reminder"
    description: >-
      Re-sends the alarm notification every 5 minutes while a probe remains
      above its high target or below its low target (and alerts are armed).
    mode: single
    trigger:
      - trigger: time_pattern
        minutes: "/5"
    action:
      - repeat:
          for_each: [1, 2, 3, 4, 5, 6]
          sequence:
            - variables:
                probe: "{{ repeat.item }}"
                is_high: "{{ is_state('binary_sensor.bbq_probe_' ~ probe ~ '_above_high', 'on') }}"
                is_low: "{{ is_state('binary_sensor.bbq_probe_' ~ probe ~ '_below_low', 'on') }}"
                armed: "{{ is_state('input_boolean.bbq_probe_' ~ probe ~ '_alerts', 'on') }}"
            - if:
                - condition: template
                  value_template: "{{ armed and (is_high or is_low) }}"
              then:
                - variables:
                    kind: "{{ 'high' if is_high else 'low' }}"
                    probe_name: >-
                      {% set n = states('input_text.bbq_probe_' ~ probe ~ '_name') | trim %}
                      {{ n if n not in ['', 'unknown', 'unavailable'] else 'Probe ' ~ probe }}
                    probe_sensors:
                      1: sensor.kitchen_meat_thermometer_temperature_probe_1
                      2: sensor.kitchen_meat_thermometer_temperature_probe_2
                      3: sensor.kitchen_meat_thermometer_temperature_probe_3
                      4: sensor.kitchen_meat_thermometer_temperature_probe_4
                      5: sensor.kitchen_meat_thermometer_temperature_probe_5
                      6: sensor.kitchen_meat_thermometer_temperature_probe_6
                    temp: "{{ states(probe_sensors[probe]) | float(0) | round(1) }}"
                    high_target: "{{ states('input_number.bbq_probe_' ~ probe ~ '_high') | float(0) | round(0) }}"
                    low_target: "{{ states('input_number.bbq_probe_' ~ probe ~ '_low') | float(0) | round(0) }}"
                    notify_title: >-
                      {% if kind == 'high' %}
                        🔥 {{ probe_name }} hit {{ temp }}°
                      {% else %}
                        🥶 {{ probe_name }} dropped to {{ temp }}°
                      {% endif %}
                    notify_message: >-
                      {% if kind == 'high' %}
                        Still {{ temp }}° — high target is {{ high_target }}°. (Reminder)
                      {% else %}
                        Still {{ temp }}° — low target is {{ low_target }}°. (Reminder)
                      {% endif %}
                - action: notify.bbq_alert_targets
                  data:
                    title: "{{ notify_title | trim }}"
                    message: "{{ notify_message | trim }}"
                    data:
                      # Same tag as the original alarm -> replaces it.
                      tag: "bbq-probe-{{ probe }}"
                      channel: "BBQ Alarm"
                      importance: high
                      priority: high
                      ttl: 0
                      sticky: "true"
                      actions:
                        - action: "BBQ_PAUSE_{{ probe }}"
                          title: "Pause alerts"
                      push:
                        sound:
                          name: default
                          critical: 1
                          volume: 1.0
                        interruption-level: time-sensitive

  # --------------------------------------------------------------------------
  # AUTOMATION 3 — "BBQ: pause from notification"
  # --------------------------------------------------------------------------
  # When you tap "Pause alerts" on a notification, the
  # Companion app fires a mobile_app_notification_action event with the
  # action string "BBQ_PAUSE_N". This automation parses N, disarms that
  # probe's alerts, and sends a quiet confirmation so you know it worked.
  - id: bbq_pause_from_notification
    alias: "BBQ: pause from notification"
    description: >-
      Handles the "Pause alerts" notification button: turns off the probe's
      alert toggle and confirms with a low-priority notification.
    mode: queued
    trigger:
      - trigger: event
        event_type: mobile_app_notification_action
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.action is defined and trigger.event.data.action.startswith('BBQ_PAUSE_') }}"
    action:
      - variables:
          # "BBQ_PAUSE_3" -> 3
          probe: "{{ trigger.event.data.action.split('_')[-1] | int }}"
          probe_name: >-
            {% set n = states('input_text.bbq_probe_' ~ probe ~ '_name') | trim %}
            {{ n if n not in ['', 'unknown', 'unavailable'] else 'Probe ' ~ probe }}
      - action: input_boolean.turn_off
        target:
          entity_id: "input_boolean.bbq_probe_{{ probe }}_alerts"
      - action: notify.bbq_alert_targets
        data:
          title: "🔕 Alerts paused"
          message: "Alerts paused for {{ probe_name }}. Re-arm from the BBQ card when ready."
          data:
            # Same tag: this quietly replaces the loud alarm notification.
            tag: "bbq-probe-{{ probe }}"
            channel: "BBQ Status"           # separate, quieter channel
            importance: low
            priority: normal


# ============================================================================
# NOTIFY GROUP — where alerts go
# ============================================================================
# A legacy notify "group" platform: one name (notify.bbq_alert_targets) that
# fans out to every phone listed under services:. The automations above only
# ever call notify.bbq_alert_targets, so adding a second phone is a one-line
# change here — no automation edits needed.
#
# REQUIRED EDIT: replace mobile_app_YOUR_PHONE_HERE with your real service
# name (see the checklist at the top of this file).
#
# To add a second phone, add another '- action:' line, e.g.:
#   services:
#     - action: mobile_app_your_phone
#     - action: mobile_app_spouses_phone
notify:
  - platform: group
    name: bbq_alert_targets
    services:
      - action: mobile_app_YOUR_PHONE_HERE
